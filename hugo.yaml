baseURL: "https://farzandkhan.github.io"
languageCode: en-us
title: "Farzand"
theme: PaperMod

markup:
  goldmark:
    renderer:
      unsafe: true
      
paginate: 10
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

params:
  env: production
  title: "Farzand Khan"
  description: "Notes for self on machines, systems, reliability and life in general"
  author: "Farzand Khan"
  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: false
  ShowWordCount: false
  ShowShareButtons: false

  assets:
    favicon: favicon/favicon.ico
    favicon16x16: favicon/favicon-16x16.png
    favicon32x32: favicon/favicon-32x32.png
    apple_touch_icon: favicon/apple-touch-icon.png
    
    customCSS:
      - css/custom.css
    disableFingerprinting: true  

  # Home page = profile/about mode
  homeInfoParams:
    Title: "Farzand Khan"
    Content: ""

  # We'll use a custom home layout instead
  profileMode:
    enabled: false

menu:
  main:
    - identifier: cryden
      name: Cryden
      url: /cryden/
      weight: 10
    - identifier: essays
      name: Essays
      url: /essays/
      weight: 20

outputs:
  home:
    - HTML
    - RSS
    - JSON
